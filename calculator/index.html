<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utils.css">
</head>
<body>
    <h1 class="text-center">Simple Calculator</h1>
    <div class="container flex flex-col mx-auto align-center justify-center">
        <div class="row">
            <input type="text" readonly aria-label="Calculation result">
        </div>
        <div class="row">
            <button class="button" aria-label="Clear">C</button>
            <button class="button" aria-label="Percentage">%</button>
            <button class="button" aria-label="Subtract">-</button>
            <button class="button" id="ora" style="padding-right: 5px;" aria-label="All Clear">AC  </button>
        </div>
        <div class="row">
            <button class="button">7</button>
            <button class="button">8</button>
            <button class="button">9</button>
            <button class="button " id="ora" aria-label="Multiply">*</button>
        </div>
        <div class="row">
            <button class="button">4</button>
            <button class="button">5</button>
            <button class="button">6</button>
            <button class="button " id="ora" aria-label="Divide">/</button>
        </div>
        <div class="row">
            <button class="button">1</button>
            <button class="button">2</button>
            <button class="button">3</button>
            <button class="button " id="ora" aria-label="Add">+</button>
        </div>
        <div class="row">
            <button class="button">0</button>
            <button class="button" aria-label="Decimal point">.</button>
            <button class="button equal-to " id="ora" colspan="2" aria-label="Equals">=</button>
    
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
